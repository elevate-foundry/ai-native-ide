<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aria</title>
  <link rel="icon" type="image/svg+xml" href="./icon.svg" />
  <style>
    :root {
      --bg: #0d1117;
      --bg-secondary: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --braille: #7dd3fc;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
    }
    
    /* File Browser */
    .files {
      width: 240px;
      background: var(--bg-secondary);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }
    
    .files-header {
      padding: 12px;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      color: var(--text-muted);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .files-header button {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 14px;
    }
    
    .path {
      padding: 8px 12px;
      font-size: 11px;
      color: var(--text-muted);
      background: rgba(0,0,0,0.2);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    
    .file-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }
    
    .file-item {
      padding: 6px 12px;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .file-item:hover { background: rgba(255,255,255,0.05); }
    .file-item.dir { color: var(--accent); }
    
    /* Git status colors */
    .file-item.modified { color: #e2b93d; }
    .file-item.untracked { color: #73c991; }
    .file-item.deleted { color: #f85149; }
    .file-item .status-badge {
      margin-left: auto;
      font-size: 10px;
      font-weight: 600;
      opacity: 0.9;
    }
    .file-item.modified .status-badge { color: #e2b93d; }
    .file-item.untracked .status-badge { color: #73c991; }
    .file-item.deleted .status-badge { color: #f85149; }
    
    /* Chat */
    .chat {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    
    .chat-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .chat-header h1 {
      font-size: 14px;
      font-weight: 600;
    }
    
    .mode-toggle {
      font-size: 12px;
      padding: 4px 10px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-muted);
      cursor: pointer;
    }
    
    .mode-toggle:hover { color: var(--text); }
    .mode-toggle.braille { color: var(--braille); border-color: var(--braille); }
    .mode-toggle.english { color: #22c55e; border-color: #22c55e; }
    
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }
    
    .msg {
      margin-bottom: 16px;
      max-width: 85%;
    }
    
    .msg.user {
      margin-left: auto;
      background: #1f3a5f;
      padding: 10px 14px;
      border-radius: 12px 12px 4px 12px;
    }
    
    .msg.assistant {
      background: var(--bg-secondary);
      padding: 12px 14px;
      border-radius: 12px 12px 12px 4px;
    }
    
    .msg .braille {
      font-family: 'Apple Braille', monospace;
      color: var(--braille);
      letter-spacing: 1px;
      line-height: 1.6;
      word-break: break-all;
    }
    
    .msg .english {
      color: var(--text);
      line-height: 1.5;
    }
    
    .msg .label {
      font-size: 10px;
      color: var(--text-muted);
      margin-bottom: 4px;
    }
    
    .input-area {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
    }
    
    .input-area textarea {
      flex: 1;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--text);
      font-size: 14px;
      resize: none;
      font-family: inherit;
    }
    
    .input-area textarea:focus {
      outline: none;
      border-color: var(--accent);
    }
    
    .input-area button {
      padding: 10px 20px;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #000;
      font-weight: 600;
      cursor: pointer;
    }
    
    .input-area button:hover { opacity: 0.9; }
    
    .status {
      padding: 4px 16px;
      font-size: 11px;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>
  <!-- File Browser -->
  <aside class="files">
    <div class="files-header">
      <span>Files</span>
      <div>
        <button onclick="loadFiles()" title="Refresh">🔄</button>
        <button onclick="goUp()" title="Go up">⬆️</button>
      </div>
    </div>
    <div class="path" id="path">~</div>
    <div class="file-list" id="fileList"></div>
  </aside>

  <!-- Chat -->
  <main class="chat">
    <header class="chat-header">
      <h1>Aria</h1>
      <button class="mode-toggle" id="modeToggle" onclick="toggleMode()">⠃⠗/EN</button>
    </header>
    
    <div class="messages" id="messages"></div>
    
    <div class="input-area">
      <textarea id="input" rows="2" placeholder="Ask Aria..." onkeydown="handleKey(event)"></textarea>
      <button onclick="send()">Send</button>
    </div>
    
    <div class="status" id="status">Ready</div>
  </main>

  <script>
    const SERVER = 'http://localhost:3200';
    const HOME = '/Users/ryanbarrett';
    let currentPath = HOME;
    let mode = 'both'; // 'braille' | 'english' | 'both'
    let gitStatus = {}; // path -> status (M, U, D)

    // Braille encoding (8-dot)
    const toBraille = text => {
      const bytes = new TextEncoder().encode(text);
      return Array.from(bytes).map(b => String.fromCodePoint(0x2800 + b)).join('');
    };

    // File browser
    async function loadFiles(path) {
      currentPath = path || currentPath;
      document.getElementById('path').textContent = currentPath.replace(HOME, '~');
      
      try {
        const res = await fetch(`${SERVER}/browse?path=${encodeURIComponent(currentPath)}`);
        const data = await res.json();
        
        const list = document.getElementById('fileList');
        list.innerHTML = '';
        
        if (data.parent) {
          const el = document.createElement('div');
          el.className = 'file-item dir';
          el.textContent = '..';
          el.onclick = () => loadFiles(data.parent);
          list.appendChild(el);
        }
        
        data.files.forEach(f => {
          const el = document.createElement('div');
          const status = gitStatus[f.path] || gitStatus[f.name];
          let statusClass = '';
          if (status === 'M') statusClass = 'modified';
          else if (status === 'U' || status === '?') statusClass = 'untracked';
          else if (status === 'D') statusClass = 'deleted';
          
          el.className = 'file-item' + (f.type === 'directory' ? ' dir' : '') + (statusClass ? ' ' + statusClass : '');
          el.innerHTML = `
            <span>${f.type === 'directory' ? '📁' : '📄'} ${f.name}</span>
            ${status ? `<span class="status-badge">${status}</span>` : ''}
          `;
          el.onclick = () => f.type === 'directory' ? loadFiles(f.path) : selectFile(f.path);
          list.appendChild(el);
        });
      } catch (e) {
        setStatus('Error loading files');
      }
    }

    function goUp() {
      const parent = currentPath.split('/').slice(0, -1).join('/') || '/';
      loadFiles(parent);
    }

    function selectFile(path) {
      document.getElementById('input').value += `\n[File: ${path}]`;
      document.getElementById('input').focus();
    }

    // Chat
    function addMessage(role, content) {
      const el = document.createElement('div');
      el.className = `msg ${role}`;
      
      if (role === 'assistant') {
        const braille = toBraille(content);
        const showBraille = mode === 'braille' || mode === 'both';
        const showEnglish = mode === 'english' || mode === 'both';
        
        el.innerHTML = `
          ${showBraille ? `<div class="braille">${braille}</div>` : ''}
          ${showEnglish ? `<div class="english">${mode === 'both' ? '<div class="label">⟶ English</div>' : ''}${content}</div>` : ''}
        `;
        el.dataset.content = content;
      } else {
        el.textContent = content;
      }
      
      document.getElementById('messages').appendChild(el);
      el.scrollIntoView({ behavior: 'smooth' });
      return el;
    }

    async function send() {
      const input = document.getElementById('input');
      const text = input.value.trim();
      if (!text) return;
      
      input.value = '';
      addMessage('user', text);
      setStatus('Thinking...');
      
      try {
        const res = await fetch(`${SERVER}/chat`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text })
        });
        
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let content = '';
        let msgEl = null;
        
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          
          const chunk = decoder.decode(value);
          for (const line of chunk.split('\n')) {
            if (line.startsWith('data: ')) {
              try {
                const data = JSON.parse(line.slice(6));
                if (data.content || data.type === 'chunk') {
                  content += data.content || '';
                  if (!msgEl) msgEl = addMessage('assistant', content);
                  else updateMessage(msgEl, content);
                }
              } catch {}
            }
          }
        }
        
        setStatus('Ready');
      } catch (e) {
        addMessage('assistant', 'Error: ' + e.message);
        setStatus('Error');
      }
    }

    function updateMessage(el, content) {
      const braille = toBraille(content);
      const showBraille = mode === 'braille' || mode === 'both';
      const showEnglish = mode === 'english' || mode === 'both';
      
      el.innerHTML = `
        ${showBraille ? `<div class="braille">${braille}</div>` : ''}
        ${showEnglish ? `<div class="english">${mode === 'both' ? '<div class="label">⟶ English</div>' : ''}${content}</div>` : ''}
      `;
      el.dataset.content = content;
      el.scrollIntoView({ behavior: 'smooth' });
    }

    function toggleMode() {
      mode = mode === 'both' ? 'braille' : mode === 'braille' ? 'english' : 'both';
      
      const btn = document.getElementById('modeToggle');
      btn.textContent = mode === 'braille' ? '⠃⠗' : mode === 'english' ? 'EN' : '⠃⠗/EN';
      btn.className = 'mode-toggle ' + (mode === 'both' ? '' : mode);
      
      // Update existing messages
      document.querySelectorAll('.msg.assistant').forEach(el => {
        if (el.dataset.content) updateMessage(el, el.dataset.content);
      });
    }

    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    }

    function setStatus(text) {
      document.getElementById('status').textContent = text;
    }

    // Fetch git status for current directory
    async function fetchGitStatus() {
      try {
        const res = await fetch(`${SERVER}/git-status?path=${encodeURIComponent(currentPath)}`);
        if (res.ok) {
          const data = await res.json();
          gitStatus = data.files || {};
        }
      } catch (e) {
        // Git status not available, that's ok
      }
    }

    // Auto-refresh file list periodically
    let refreshInterval = null;
    function startAutoRefresh() {
      if (refreshInterval) clearInterval(refreshInterval);
      refreshInterval = setInterval(async () => {
        await fetchGitStatus();
        await loadFiles();
      }, 3000); // Refresh every 3 seconds
    }

    // Init
    async function init() {
      await fetchGitStatus();
      await loadFiles(HOME);
      startAutoRefresh();
    }
    init();
  </script>
</body>
</html>
